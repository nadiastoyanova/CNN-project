services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cnn-transfer-learning-app
    ports:
      - "5000:5000"
    environment:
      FLASK_DEBUG: "0"
      # The app discovers all models under this root.
      MODELS_ROOT: /app/model-store
      # Optional: set the default selected model ID in the dropdown.
      # Possible values (auto-generated by the app from filenames):
      #   keras-vanilla-cnn-animals        → CNN Vanilla
      #   keras-animals10-efficientnetv2s  → EfficientNetV2
      #   keras-convnext-animals10-model   → ConvNeXt
      #   hf-vit-model                     → ViT
      MODEL_ID: hf-vit-model
    volumes:
      # ── ViT (Hugging Face folder: must contain config.json + model.safetensors)
      # FIX: renamed from "vit model" (space) to "vit-model" to avoid shell/Docker issues.
      - "./models/vit-model:/app/model-store/vit-model:ro"

      # ── EfficientNetV2 (.h5 single file)
      - "./models/animals10_efficientnetv2s.h5:/app/model-store/animals10_efficientnetv2s.h5:ro"

      # ── ConvNeXt (.keras file + label_map.json alongside it)
      # FIX: was mapped to generic "experiment-a" placeholder, not the real model folder.
      # Place your exported convnext_animals10/ folder under models/.
      - "./models/convnext-model:/app/model-store/convnext-model:ro"

      # ── CNN Vanilla (.keras file)
      # FIX: was completely missing from the compose file.
      # Save the model as vanilla_cnn.keras and place it under models/.
      - "./models/vanilla_cnn.keras:/app/model-store/vanilla_cnn.keras:ro"

    restart: unless-stopped
